<svg viewBox="0 0 300 300" class="w-full h-full text-zinc-800 dark:text-zinc-200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background engineering grid pattern -->
    <pattern id="cad-grid" width="15" height="15" patternUnits="userSpaceOnUse">
      <path d="M 15 0 L 0 0 0 15" fill="none" stroke="currentColor" stroke-width="0.5" opacity="0.08"/>
    </pattern>
    
    <!-- Chrome-steel gradients for metal parts -->
    <linearGradient id="metal-pin" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4b5563" stop-opacity="0.95"/> <!-- gray-600 -->
      <stop offset="50%" stop-color="#9ca3af" stop-opacity="0.95"/> <!-- gray-400 -->
      <stop offset="100%" stop-color="#1f2937" stop-opacity="0.95"/> <!-- gray-800 -->
    </linearGradient>
    
    <linearGradient id="metal-coupling" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#374151" stop-opacity="0.95"/> <!-- gray-700 -->
      <stop offset="50%" stop-color="#6b7280" stop-opacity="0.95"/> <!-- gray-500 -->
      <stop offset="100%" stop-color="#111827" stop-opacity="0.95"/> <!-- gray-900 -->
    </linearGradient>

    <!-- Glowing filter for metal-to-metal seals -->
    <filter id="glow-seal" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2.5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Dimension arrows -->
    <marker id="cad-arrow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 2 L 10 5 L 0 8 z" fill="#ef4444"/>
    </marker>
  </defs>

  <!-- Foliated Grid background -->
  <rect width="100%" height="100%" fill="url(#cad-grid)"/>

  <!-- Centerline -->
  <line x1="150" y1="10" x2="150" y2="290" stroke="currentColor" stroke-width="1" stroke-dasharray="5,5" opacity="0.35"/>

  <!-- LEFT SIDE CROSS-SECTION (With thread profiles) -->
  <!-- Left Top Pin (Tube Wall) - Threads start at y=50 (outside coupling y=60) to show makeup loss -->
  <path d="M 90,20 L 90,50 L 91,55 L 90,60 L 92,65 L 91,70 L 93,75 L 92,80 L 94,85 L 93,90 L 95,95 L 94,100 L 96,105 L 95,110 L 97,115 L 96,120 L 98,125 L 97,130 L 99,135 L 98,140 L 105,140 L 105,20 Z" fill="url(#metal-pin)" stroke="currentColor" stroke-width="0.8"/>
  
  <!-- Left Bottom Pin (Tube Wall) - Threads start at y=250 (outside coupling y=240) -->
  <path d="M 90,280 L 90,250 L 91,245 L 90,240 L 92,235 L 91,230 L 93,225 L 92,220 L 94,215 L 93,210 L 95,205 L 94,200 L 96,195 L 95,190 L 97,185 L 96,180 L 98,175 L 97,170 L 99,165 L 98,160 L 105,160 L 105,280 Z" fill="url(#metal-pin)" stroke="currentColor" stroke-width="0.8"/>
  
  <!-- Left Coupling (Box Wall) - Inner thread details match pins from y=60 down to y=140, and y=160 to y=240 -->
  <path d="M 75,60 L 90,60 L 92,65 L 91,70 L 93,75 L 92,80 L 94,85 L 93,90 L 95,95 L 94,100 L 96,105 L 95,110 L 97,115 L 96,120 L 98,125 L 97,130 L 99,135 L 98,140 L 98,160 L 99,165 L 97,170 L 98,175 L 96,180 L 97,185 L 95,190 L 96,195 L 94,200 L 95,205 L 93,210 L 94,215 L 92,220 L 93,225 L 91,230 L 92,235 L 90,240 L 75,240 Z" fill="url(#metal-coupling)" stroke="currentColor" stroke-width="0.8"/>

  <!-- RIGHT SIDE CROSS-SECTION (Symmetric) -->
  <!-- Right Top Pin (Tube Wall) -->
  <path d="M 210,20 L 210,50 L 209,55 L 210,60 L 208,65 L 209,70 L 207,75 L 208,80 L 206,85 L 207,90 L 205,95 L 206,100 L 204,105 L 205,110 L 203,115 L 204,120 L 202,125 L 203,130 L 201,135 L 202,140 L 195,140 L 195,20 Z" fill="url(#metal-pin)" stroke="currentColor" stroke-width="0.8"/>
  
  <!-- Right Bottom Pin (Tube Wall) -->
  <path d="M 210,280 L 210,250 L 209,245 L 210,240 L 208,235 L 209,230 L 207,225 L 208,220 L 206,215 L 207,210 L 205,205 L 206,200 L 204,195 L 205,190 L 203,185 L 204,180 L 202,175 L 203,170 L 201,165 L 202,160 L 195,160 L 195,280 Z" fill="url(#metal-pin)" stroke="currentColor" stroke-width="0.8"/>
  
  <!-- Right Coupling (Box Wall) -->
  <path d="M 225,60 L 210,60 L 208,65 L 209,70 L 207,75 L 208,80 L 206,85 L 207,90 L 205,95 L 206,100 L 204,105 L 205,110 L 203,115 L 204,120 L 202,125 L 203,130 L 201,135 L 202,140 L 202,160 L 201,165 L 203,170 L 202,175 L 204,180 L 203,185 L 205,190 L 204,195 L 206,200 L 205,205 L 207,210 L 206,215 L 208,220 L 207,225 L 209,230 L 208,235 L 210,240 L 225,240 Z" fill="url(#metal-coupling)" stroke="currentColor" stroke-width="0.8"/>

  <!-- INTERNAL BORE SHADOWS AND GUIDE LINES -->
  <line x1="105" y1="20" x2="105" y2="280" stroke="currentColor" stroke-width="0.75" stroke-dasharray="3,3" opacity="0.3"/>
  <line x1="195" y1="20" x2="195" y2="280" stroke="currentColor" stroke-width="0.75" stroke-dasharray="3,3" opacity="0.3"/>

  <!-- GAS-TIGHT METAL-TO-METAL SEAL GLOW ZONES (Near Pin Noses y=140 and y=160) -->
  <!-- Top Seals -->
  <circle cx="102" cy="140" r="3" fill="#22c55e" filter="url(#glow-seal)" opacity="0.9"/>
  <circle cx="198" cy="140" r="3" fill="#22c55e" filter="url(#glow-seal)" opacity="0.9"/>
  <!-- Bottom Seals -->
  <circle cx="102" cy="160" r="3" fill="#22c55e" filter="url(#glow-seal)" opacity="0.9"/>
  <circle cx="198" cy="160" r="3" fill="#22c55e" filter="url(#glow-seal)" opacity="0.9"/>

  <!-- CAD DIMENSION LINES WITH ARROWS -->
  <!-- 1. Coupling OD (Top Width) -->
  <line x1="75" y1="57" x2="75" y2="38" stroke="#71717a" stroke-width="0.75" opacity="0.7"/>
  <line x1="225" y1="57" x2="225" y2="38" stroke="#71717a" stroke-width="0.75" opacity="0.7"/>
  <line x1="75" y1="45" x2="225" y2="45" stroke="#ef4444" stroke-width="1.2" marker-start="url(#cad-arrow)" marker-end="url(#cad-arrow)"/>

  <!-- 2. Pipe Wall Thickness (Top Left Corner) -->
  <line x1="90" y1="18" x2="90" y2="10" stroke="#71717a" stroke-width="0.75" opacity="0.7"/>
  <line x1="105" y1="18" x2="105" y2="10" stroke="#71717a" stroke-width="0.75" opacity="0.7"/>
  <line x1="90" y1="13" x2="105" y2="13" stroke="#ef4444" stroke-width="1.2" marker-start="url(#cad-arrow)" marker-end="url(#cad-arrow)"/>

  <!-- 3. Connection Out-to-Out / Coupling Height (Left Height) -->
  <line x1="72" y1="60" x2="48" y2="60" stroke="#71717a" stroke-width="0.75" opacity="0.7"/>
  <line x1="72" y1="240" x2="48" y2="240" stroke="#71717a" stroke-width="0.75" opacity="0.7"/>
  <line x1="55" y1="60" x2="55" y2="240" stroke="#ef4444" stroke-width="1.2" marker-start="url(#cad-arrow)" marker-end="url(#cad-arrow)"/>

  <!-- 4. Makeup Loss / Pin penetration (Right Offset: from coupling face y=60 to pin nose y=140) -->
  <line x1="225" y1="60" x2="255" y2="60" stroke="#71717a" stroke-width="0.75" opacity="0.7"/>
  <line x1="98" y1="140" x2="255" y2="140" stroke="#71717a" stroke-width="0.75" stroke-dasharray="2,2" opacity="0.7"/>
  <line x1="248" y1="60" x2="248" y2="140" stroke="#ef4444" stroke-width="1.2" marker-start="url(#cad-arrow)" marker-end="url(#cad-arrow)"/>

  <!-- 5. Pipe OD (Bottom Width) -->
  <line x1="90" y1="278" x2="90" y2="258" stroke="#71717a" stroke-width="0.75" opacity="0.7"/>
  <line x1="210" y1="278" x2="210" y2="258" stroke="#71717a" stroke-width="0.75" opacity="0.7"/>
  <line x1="90" y1="265" x2="210" y2="265" stroke="#ef4444" stroke-width="1.2" marker-start="url(#cad-arrow)" marker-end="url(#cad-arrow)"/>

  <!-- 6. Inner Diameter (Top Width inside bore) -->
  <line x1="105" y1="28" x2="195" y2="28" stroke="#ef4444" stroke-width="1.2" marker-start="url(#cad-arrow)" marker-end="url(#cad-arrow)"/>
</svg>
